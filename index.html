<meta name="robots" content="noindex">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tier Salary Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.9em; color: #555; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }

        .row { display: grid; grid-template-columns: 2.5fr 1fr 1.2fr; gap: 15px; margin-bottom: 10px; align-items: center; padding: 5px 0; border-bottom: 1px solid #f1f1f1; }
        .header { font-weight: bold; color: #70757a; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        .multiplier { font-size: 0.8em; color: #1e8e3e; font-weight: bold; background: #e6f4ea; padding: 2px 6px; border-radius: 4px; }
        
        .result-box { margin-top: 30px; padding: 20px; background: #1a73e8; color: white; border-radius: 10px; text-align: center; }
        .total-amount { font-size: 2.2em; font-weight: bold; display: block; }
        .summary-text { font-size: 0.9em; opacity: 0.9; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Salary Calculator</h2>
    
    <div class="setup-grid">
        <div class="control-group">
            <label>Select Tier</label>
            <select id="tierSelect" onchange="update()">
                <option value="1">Tier 1 (Base: 1297.5 | Hourly: 8.5)</option>
                <option value="2">Tier 2 (Base: 1401.0 | Hourly: 9.2)</option>
                <option value="3">Tier 3 (Base: 1426.9 | Hourly: 9.4)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Work Type</label>
            <select id="workType" onchange="update()">
                <option value="full">Full Time (100% Base)</option>
                <option value="part">Part Time (50% Base)</option>
            </select>
        </div>
    </div>

    <div class="row header">
        <div>Shift Category</div>
        <div>Hours</div>
        <div style="text-align: right;">Earned (GEL)</div>
    </div>

    <div id="calculator-rows"></div>

    <div class="result-box">
        <div class="summary-text" id="baseDisplay">Base: 0.00 GEL</div>
        <span class="total-amount" id="grandTotal">0.00 GEL</span>
    </div>
</div>

<script>
    const tierData = {
        "1": { base: 1297.5, hourly: 8.5 },
        "2": { base: 1401.0, hourly: 9.2 },
        "3": { base: 1426.9, hourly: 9.4 }
    };

    const multipliers = [
        { id: 'night', label: 'Night Hours', val: 1.4 },
        { id: 'ot', label: 'Overtime', val: 2 },
        { id: 'night_ot', label: 'Night Overtime', val: 2.4 },
        { id: 'ph', label: 'Public Holiday', val: 1.25 },
        { id: 'ph_night', label: 'PH Night', val: 1.5 },
        { id: 'ph_ot', label: 'PH Overtime', val: 3.5 },
        { id: 'ph_night_ot', label: 'PH Night OT', val: 4.4 }
        
    ];

    function init() {
        const container = document.getElementById('calculator-rows');
        multipliers.forEach(m => {
            container.innerHTML += `
                <div class="row">
                    <div>${m.label} <span class="multiplier">${m.val}x</span></div>
                    <input type="number" id="hrs_${m.id}" value="0" min="0" oninput="update()">
                    <div id="earned_${m.id}" style="text-align: right; font-weight: 600;">0.00</div>
                </div>
            `;
        });
        update();
    }

    function update() {
        const tier = document.getElementById('tierSelect').value;
        const type = document.getElementById('workType').value;
        
        let baseSalary = tierData[tier].base;
        const hourlyRate = tierData[tier].hourly;

        // Apply Part-Time half salary rule
        if (type === 'part') {
            baseSalary = baseSalary / 2;
        }

        document.getElementById('baseDisplay').innerText = `Contract Base: ${baseSalary.toFixed(2)} GEL`;

        let totalExtra = 0;
        multipliers.forEach(m => {
            const hours = parseFloat(document.getElementById('hrs_' + m.id).value) || 0;
            const earned = hours * (hourlyRate * m.val);
            document.getElementById('earned_' + m.id).innerText = earned.toFixed(2);
            totalExtra += earned;
        });

        const finalTotal = baseSalary + totalExtra;
        document.getElementById('grandTotal').innerText = finalTotal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' GEL';
    }

    window.onload = init;
</script>

</body>
</html>
